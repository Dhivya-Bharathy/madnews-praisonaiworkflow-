<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>madnews - Left|Right|Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <header class="border-b border-slate-200 bg-white/95 backdrop-blur">
      <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6">
        <a href="/" class="text-4xl font-semibold tracking-tight text-slate-900" aria-label="madnews">
          <span>mad</span>
          <span class="px-2 text-slate-500">|</span>
          <span>news</span>
        </a>
        <nav
          aria-label="perspective order"
          class="hidden rounded-md border border-slate-200 text-[11px] font-semibold tracking-wider text-slate-500 md:flex"
        >
          <span class="border-r border-slate-200 px-3 py-1.5">LEFT</span>
          <span class="border-r border-slate-200 px-3 py-1.5">CENTER</span>
          <span class="px-3 py-1.5">RIGHT</span>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6">
      <form id="analyze-form" class="mx-auto grid max-w-3xl grid-cols-1 gap-2 sm:grid-cols-[1fr,140px]">
        <div class="relative">
          <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">⌕</span>
          <input
            id="search-input"
            name="q"
            type="text"
            placeholder="Search any news topic"
            autocomplete="off"
            required
            class="h-12 w-full rounded-xl border border-amber-200 bg-white pl-9 pr-3 text-sm outline-none ring-amber-200 transition focus:ring-2"
          />
        </div>
        <button
          id="analyze-btn"
          type="submit"
          class="h-12 rounded-xl bg-slate-400 text-base font-semibold text-white transition hover:bg-slate-500 disabled:opacity-70"
        >
          Analyze
        </button>
      </form>

      <section id="loading-panel" class="mx-auto mt-4 hidden max-w-3xl" aria-live="polite">
        <p id="fetch-msg" class="text-sm font-medium text-slate-600"></p>
        <p id="status-msg" class="mt-1 text-lg font-semibold text-slate-800"></p>
      </section>

      <section id="empty-state" class="mx-auto mt-5 hidden max-w-2xl rounded-xl border border-slate-200 bg-white p-5 text-center" role="status">
        <p id="empty-state-title" class="text-xl font-semibold"></p>
        <p id="empty-state-text" class="mt-2 text-sm text-slate-600"></p>
        <p id="empty-state-hint" class="mt-2 hidden text-xs text-slate-500" aria-live="polite"></p>
      </section>

      <section id="results" class="mt-5 hidden grid-cols-1 gap-3 lg:grid lg:grid-cols-3">
        <div class="rounded-xl border border-slate-200 bg-white p-4">
          <h2 class="text-2xl font-bold tracking-widest text-blue-600">LEFT</h2>
          <ul id="left-list" class="mt-3 space-y-3 text-sm leading-6 text-slate-700"></ul>
          <h5 class="mt-4 text-xs font-semibold uppercase tracking-wider text-slate-500">Source Links</h5>
          <ul id="left-sources" class="source-links mt-2 space-y-2 text-sm"></ul>
        </div>
        <div class="rounded-xl border border-slate-200 bg-white p-4">
          <h2 class="text-2xl font-bold tracking-widest text-slate-500">CENTER</h2>
          <ul id="center-list" class="mt-3 space-y-3 text-sm leading-6 text-slate-700"></ul>
          <h5 class="mt-4 text-xs font-semibold uppercase tracking-wider text-slate-500">Source Links</h5>
          <ul id="center-sources" class="source-links mt-2 space-y-2 text-sm"></ul>
        </div>
        <div class="rounded-xl border border-slate-200 bg-white p-4">
          <h2 class="text-2xl font-bold tracking-widest text-red-600">RIGHT</h2>
          <ul id="right-list" class="mt-3 space-y-3 text-sm leading-6 text-slate-700"></ul>
          <h5 class="mt-4 text-xs font-semibold uppercase tracking-wider text-slate-500">Source Links</h5>
          <ul id="right-sources" class="source-links mt-2 space-y-2 text-sm"></ul>
        </div>
      </section>

      <section id="blind-spots" class="mt-3 hidden rounded-xl border border-slate-200 bg-white p-4">
        <h3 class="text-xl font-semibold">Blind Spots</h3>
        <div class="mt-3 grid grid-cols-1 gap-3 md:grid-cols-3">
          <div>
            <h4 class="mb-2 text-sm font-semibold">What LEFT may ignore</h4>
            <ul id="left-ignores" class="space-y-2 text-sm text-slate-700"></ul>
          </div>
          <div>
            <h4 class="mb-2 text-sm font-semibold">What CENTER may ignore</h4>
            <ul id="center-ignores" class="space-y-2 text-sm text-slate-700"></ul>
          </div>
          <div>
            <h4 class="mb-2 text-sm font-semibold">What RIGHT may ignore</h4>
            <ul id="right-ignores" class="space-y-2 text-sm text-slate-700"></ul>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="/results.js"></script>
  </body>
</html>
